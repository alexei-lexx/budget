schema: spec-driven

context: |
  File `docs/constitution.md` is the project's constitution.
  The constitution defines the principles and guidelines that govern the project.
  This includes coding standards, architectural decisions, tech stack choices, and test strategies.
  Proceed ONLY AFTER reading it.

  All principles stated in the constitution are NON-NEGOTIABLE and MUST be followed.

  Run `npx prettier --write openspec/` after creating or updating any artifact to ensure consistent formatting.

  To check the application, assume that the backend and frontend are already up and running.

rules:
  proposal:
    - Include a "## Constitution Compliance" section listing which constitution principles apply and confirming compliance or flagging violations
  design:
    - Include a "## Constitution Compliance" section listing which constitution principles apply and confirming compliance or flagging violations
  tasks:
    - Include a "## Constitution Compliance" section listing which constitution principles apply and confirming compliance or flagging violations

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
