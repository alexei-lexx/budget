type Query {
  accounts: [Account!]!
  supportedCurrencies: [String!]!
  categories(type: CategoryType): [Category!]!
  transactions(
    pagination: PaginationInput
    filters: TransactionFilterInput
  ): TransactionConnection!
  transfer(id: ID!): Transfer
  transactionPatterns(type: TransactionPatternType!): [TransactionPattern!]!
  monthlyReport(year: Int!, month: Int!, type: ReportType!): MonthlyReport!
  insight(input: InsightInput!): InsightResponse!
  transactionDescriptionSuggestions(searchText: String!): [String!]!
}

type User {
  email: String!
}

type Account {
  id: ID!
  name: String!
  currency: String!
  initialBalance: Float!
  balance: Float!
}

enum CategoryType {
  INCOME
  EXPENSE
}

enum MessageRole {
  USER
  ASSISTANT
}

enum TransactionType {
  INCOME
  EXPENSE
  TRANSFER_IN
  TRANSFER_OUT
  REFUND
}

enum TransactionPatternType {
  INCOME
  EXPENSE
  REFUND
}

enum ReportType {
  INCOME
  EXPENSE
}

type InsightResponse {
  answer: String!
}

type Category {
  id: ID!
  name: String!
  type: CategoryType!
  excludeFromReports: Boolean!
}

"""
Lightweight account representation embedded in Transaction responses.
Always reflects the current state of the account at query time.
If an account ID exists but the entity cannot be found (data integrity edge case),
stub data with name "Unknown" is returned instead of null.
"""
type TransactionEmbeddedAccount {
  id: ID!
  name: String!
  isArchived: Boolean!
}

"""
Lightweight category representation embedded in Transaction responses.
Always reflects the current state of the category at query time.
If a category ID exists but the entity cannot be found (data integrity edge case),
stub data with name "Unknown" is returned instead of null.
If category ID is null (uncategorized transaction), the category field returns null.
"""
type TransactionEmbeddedCategory {
  id: ID!
  name: String!
  isArchived: Boolean!
}

"""
Transaction with embedded account and category data.
Eliminates N+1 queries by fetching account and category data directly without separate lookups.
Breaking change: accountId and categoryId fields removed (use account.id and category.id instead).
"""
type Transaction {
  id: ID!
  account: TransactionEmbeddedAccount!
  category: TransactionEmbeddedCategory
  type: TransactionType!
  amount: Float!
  currency: String!
  date: String!
  description: String
  transferId: String
}

type TransactionPattern {
  accountId: ID!
  accountName: String!
  categoryId: ID!
  categoryName: String!
}

type Transfer {
  id: ID!
  outboundTransaction: Transaction!
  inboundTransaction: Transaction!
}

input CreateAccountInput {
  name: String!
  currency: String!
  initialBalance: Float!
}

input UpdateAccountInput {
  id: ID!
  name: String
  currency: String
  initialBalance: Float
}

input CreateCategoryInput {
  name: String!
  type: CategoryType!
  excludeFromReports: Boolean!
}

input UpdateCategoryInput {
  id: ID!
  name: String
  type: CategoryType
  excludeFromReports: Boolean
}

input CreateTransactionInput {
  accountId: ID!
  categoryId: ID
  type: TransactionType!
  amount: Float!
  date: String!
  description: String
}

input UpdateTransactionInput {
  id: ID!
  accountId: ID
  categoryId: ID
  type: TransactionType
  amount: Float
  date: String
  description: String
}

input CreateTransferInput {
  fromAccountId: ID!
  toAccountId: ID!
  amount: Float!
  date: String!
  description: String
}

input UpdateTransferInput {
  id: ID!
  fromAccountId: ID
  toAccountId: ID
  amount: Float
  date: String
  description: String
}

input PaginationInput {
  first: Int
  after: String
}

input TransactionFilterInput {
  accountIds: [ID!]
  categoryIds: [ID!]
  includeUncategorized: Boolean
  dateAfter: String
  dateBefore: String
  types: [TransactionType!]
}

input DateRangeInput {
  startDate: String!
  endDate: String!
}

input MessageInput {
  role: MessageRole!
  content: String!
}

input InsightInput {
  question: String!
  dateRange: DateRangeInput!
  conversation: [MessageInput!]
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type TransactionEdge {
  node: Transaction!
  cursor: String!
}

type TransactionConnection {
  edges: [TransactionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type MonthlyReportCurrencyBreakdown {
  currency: String!
  totalAmount: Float!
  percentage: Int!
}

type MonthlyReportCategory {
  categoryId: ID
  categoryName: String!
  currencyBreakdowns: [MonthlyReportCurrencyBreakdown!]!
  topTransactions: [Transaction!]!
  totalTransactionCount: Int!
}

type MonthlyReportCurrencyTotal {
  currency: String!
  totalAmount: Float!
}

type MonthlyReport {
  year: Int!
  month: Int!
  type: ReportType! # TODO: remove if not needed
  categories: [MonthlyReportCategory!]!
  currencyTotals: [MonthlyReportCurrencyTotal!]!
}

type Mutation {
  ensureUser: User!
  createAccount(input: CreateAccountInput!): Account!
  updateAccount(input: UpdateAccountInput!): Account!
  deleteAccount(id: ID!): Boolean
  createCategory(input: CreateCategoryInput!): Category!
  updateCategory(input: UpdateCategoryInput!): Category!
  deleteCategory(id: ID!): Category!
  createTransaction(input: CreateTransactionInput!): Transaction!
  updateTransaction(input: UpdateTransactionInput!): Transaction!
  deleteTransaction(id: ID!): Transaction!
  createTransfer(input: CreateTransferInput!): Transfer!
  updateTransfer(input: UpdateTransferInput!): Transfer!
  deleteTransfer(id: ID!): Boolean
}
