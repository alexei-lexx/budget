# GraphQL Schema Contract: Monthly Expense Report by Weekday
#
# This file documents the GraphQL API contract for the weekday expense report feature.
# Add these definitions to backend/src/schema.graphql

# ============================================================================
# QUERY EXTENSION
# ============================================================================

extend type Query {
  """
  Retrieve expense aggregation by weekday for a specific month.
  Returns total and average spending amounts for each day of the week (Monday-Sunday).

  Input validation:
  - year: Must be within ±10 years of current year
  - month: Must be 1-12
  - type: Currently only EXPENSE is supported

  Performance:
  - Expected response time: < 1 second for typical monthly transaction volumes
  - Caching: No caching (always returns fresh aggregation)
  """
  weekdayReport(
    year: Int!
    month: Int!
    type: TransactionType!
  ): WeekdayReport!
}

# ============================================================================
# RESPONSE TYPES
# ============================================================================

"""
Aggregated expense report grouped by weekday for a specific month.
All amounts are calculated from active (non-archived) expense transactions only.
"""
type WeekdayReport {
  """
  4-digit year (e.g., 2025)
  """
  year: Int!

  """
  Month number (1-12)
  """
  month: Int!

  """
  Weekday aggregations for Monday through Sunday.
  Always contains 7 elements in order: [Monday, Tuesday, ..., Sunday]
  Weekdays with no expenses have empty currencyBreakdowns arrays.
  """
  weekdays: [WeekdayReportDay!]!

  """
  Total expense amounts per currency for the entire month.
  Used to calculate percentages in weekday breakdowns.
  Sorted alphabetically by currency code.
  """
  currencyTotals: [WeekdayReportCurrencyTotal!]!
}

"""
Expense aggregation for a single weekday within a month.
"""
type WeekdayReportDay {
  """
  Weekday index using Monday-first convention:
  - 0 = Monday
  - 1 = Tuesday
  - 2 = Wednesday
  - 3 = Thursday
  - 4 = Friday
  - 5 = Saturday
  - 6 = Sunday
  """
  weekday: Int!

  """
  Breakdown by currency for this weekday.
  Contains one entry per currency with expenses on this weekday.
  Empty array if no expenses for this weekday in the month.
  Sorted alphabetically by currency code.
  """
  currencyBreakdowns: [WeekdayReportCurrencyBreakdown!]!
}

"""
Expense breakdown for a specific weekday and currency combination.
Includes total amount, average amount, and percentage of monthly total.
"""
type WeekdayReportCurrencyBreakdown {
  """
  ISO 4217 currency code (e.g., "USD", "EUR", "GBP")
  """
  currency: String!

  """
  Sum of all expense amounts for this weekday in this currency.
  Precision: Float with 2 decimal places in most currencies.
  """
  totalAmount: Float!

  """
  Average expense amount for this weekday.

  Calculation: totalAmount ÷ number of times this weekday appeared in the month

  Example: If November 2025 has 4 Mondays with $200 total Monday expenses,
  averageAmount = $200 ÷ 4 = $50 per Monday

  Note: Divides by weekday occurrences, NOT by number of transactions.
  """
  averageAmount: Float!

  """
  Percentage of monthly total for this currency that this weekday represents.

  Calculation: Math.round((totalAmount ÷ currencyTotal.totalAmount) × 100)

  Range: 0-100 (integer)
  Sum of all weekday percentages for a currency = 100%
  """
  percentage: Int!
}

"""
Total expense amount for a single currency across all weekdays in the month.
Used to calculate percentage values in WeekdayReportCurrencyBreakdown.
"""
type WeekdayReportCurrencyTotal {
  """
  ISO 4217 currency code (e.g., "USD", "EUR", "GBP")
  """
  currency: String!

  """
  Sum of all expense amounts in this currency for the entire month.
  Equals sum of all weekday totalAmounts for this currency.
  """
  totalAmount: Float!
}

# ============================================================================
# USAGE EXAMPLES
# ============================================================================

# Example Query:
# query GetWeekdayReport {
#   weekdayReport(year: 2025, month: 11, type: EXPENSE) {
#     year
#     month
#     weekdays {
#       weekday
#       currencyBreakdowns {
#         currency
#         totalAmount
#         averageAmount
#         percentage
#       }
#     }
#     currencyTotals {
#       currency
#       totalAmount
#     }
#   }
# }

# Example Response (single currency):
# {
#   "data": {
#     "weekdayReport": {
#       "year": 2025,
#       "month": 11,
#       "weekdays": [
#         {
#           "weekday": 0,
#           "currencyBreakdowns": [
#             {
#               "currency": "USD",
#               "totalAmount": 200.50,
#               "averageAmount": 50.13,
#               "percentage": 25
#             }
#           ]
#         },
#         {
#           "weekday": 1,
#           "currencyBreakdowns": [
#             {
#               "currency": "USD",
#               "totalAmount": 150.00,
#               "averageAmount": 30.00,
#               "percentage": 19
#             }
#           ]
#         }
#         // ... weekdays 2-6
#       ],
#       "currencyTotals": [
#         {
#           "currency": "USD",
#           "totalAmount": 800.00
#         }
#       ]
#     }
#   }
# }

# Example Response (multi-currency):
# {
#   "data": {
#     "weekdayReport": {
#       "year": 2025,
#       "month": 11,
#       "weekdays": [
#         {
#           "weekday": 0,
#           "currencyBreakdowns": [
#             {
#               "currency": "EUR",
#               "totalAmount": 50.00,
#               "averageAmount": 12.50,
#               "percentage": 20
#             },
#             {
#               "currency": "USD",
#               "totalAmount": 100.00,
#               "averageAmount": 25.00,
#               "percentage": 25
#             }
#           ]
#         }
#         // ... weekdays 1-6
#       ],
#       "currencyTotals": [
#         {
#           "currency": "EUR",
#           "totalAmount": 250.00
#         },
#         {
#           "currency": "USD",
#           "totalAmount": 400.00
#         }
#       ]
#     }
#   }
# }

# Example Response (empty month):
# {
#   "data": {
#     "weekdayReport": {
#       "year": 2025,
#       "month": 11,
#       "weekdays": [],
#       "currencyTotals": []
#     }
#   }
# }

