# GraphQL Schema Changes: Embed Account and Category Into Transaction

## New Types

type TransactionEmbeddedAccount {
  """
  Account unique identifier (UUID)
  """
  id: ID!

  """
  Account display name
  """
  name: String!

  """
  Current archive status of the account
  Reflects real-time state from database at query time
  """
  isArchived: Boolean!
}

type TransactionEmbeddedCategory {
  """
  Category unique identifier (UUID)
  """
  id: ID!

  """
  Category display name
  """
  name: String!

  """
  Current archive status of the category
  Reflects real-time state from database at query time
  """
  isArchived: Boolean!
}

## Modified Transaction Type

type Transaction {
  """
  Unique transaction identifier (UUID)
  """
  id: ID!

  """
  DEPRECATED: Use account.id instead
  Account reference (will be removed in future version)
  """
  accountId: ID! @deprecated(reason: "Use account.id instead")

  """
  NEW: Embedded account object with id, name, and current isArchived status
  Non-nullable - every transaction must reference valid account
  Account data always reflects current database state
  If account missing (data integrity issue): resolver returns null
  """
  account: TransactionEmbeddedAccount!

  """
  DEPRECATED: Use category.id instead
  Category reference, optional (will be removed in future version)
  """
  categoryId: ID @deprecated(reason: "Use category.id instead")

  """
  NEW: Embedded category object with id, name, and current isArchived status
  Nullable - transactions may not have a category assigned
  Returns null if:
    - Transaction is uncategorized (categoryId is null)
    - Category entity missing from database (data integrity issue)
  Category data always reflects current database state
  """
  category: TransactionEmbeddedCategory

  """
  Transaction type (INCOME, EXPENSE, TRANSFER_IN, TRANSFER_OUT)
  """
  type: TransactionType!

  """
  Transaction amount in account currency (positive value)
  """
  amount: Float!

  """
  Currency code (USD, EUR, etc.) - 3 letter ISO code
  """
  currency: String!

  """
  Transaction date (ISO 8601: YYYY-MM-DD)
  """
  date: String!

  """
  Optional user-provided description
  """
  description: String

  """
  For transfer transactions: links TRANSFER_OUT and TRANSFER_IN pairs
  Null for non-transfer transactions
  """
  transferId: String

  """
  Timestamp when transaction was created (ISO 8601)
  """
  createdAt: String!

  """
  Timestamp when transaction was last modified (ISO 8601)
  """
  updatedAt: String!
}

## No Changes Required for Related Types

type Account {
  # No changes - already contains: id, name, currency, initialBalance, balance, isArchived
}

type Category {
  # No changes - already contains: id, name, type, isArchived
}

## Performance: DataLoader Batching

The implementation uses DataLoader pattern:
- Resolver for Transaction.account field uses accountLoader DataLoader
- Resolver for Transaction.category field uses categoryLoader DataLoader
- Batching window: Single event loop tick (<1ms)
- Query reduction:
  * Without DataLoader: 1 + (2 * N) queries for N transactions (N+1 problem)
  * With DataLoader: 3 queries regardless of N
  * Example: 50 transactions = 101 queries → 3 queries (97% reduction)

## Breaking Changes Notice

BREAKING: This feature removes accountId and categoryId from the GraphQL Transaction type.

Migration path:
1. Backend deployment: Schema updated with new embedded fields
2. Frontend update: GraphQL operations request account/category instead of IDs
3. Component updates: Use transaction.account.name instead of lookup maps
4. Coordinated deployment: Both backend and frontend deployed together

No database schema changes required.

## Edge Case Handling

### Missing Account (Data Integrity Issue)
- Transaction references accountId that doesn't exist in Accounts table
- Resolver returns: null
- No GraphQL error (null is valid for non-null field resolution error)
- Logged as warning for monitoring
- Frontend display: Can show `Account not found (ID: {accountId})`

### Missing Category (Data Integrity Issue)
- Transaction references categoryId that doesn't exist in Categories table
- Resolver returns: null
- Logged as warning for monitoring
- Frontend display: Can show nothing (category is optional)

### Archived Account
- Transaction references account with isArchived: true
- Resolver returns: { id, name, isArchived: true }
- Frontend can gray out or indicate archived status

### Uncategorized Transaction
- Transaction has categoryId: null
- Resolver returns: null
- No error, expected behavior
- Frontend handles gracefully (no category to display)
