# Schema Additions: Natural Language Transaction Creation
#
# These additions are applied to backend/src/schema.graphql.
# No existing types are modified; this file lists only the new additions.
#
# Placement in schema.graphql:
#   - CreateTransactionFromTextInput → add to the input types section (alongside CreateTransactionInput)
#   - createTransactionFromText mutation → add to Mutation type (alongside createTransaction)
#
# Return type: existing Transaction type (no new types needed)

# ─── New input type ─────────────────────────────────────────────────────────

"""
Input for creating a transaction from a natural-language text description.
All transaction fields (type, amount, category, account, date, description)
are inferred from text by the AI agent.
"""
input CreateTransactionFromTextInput {
  """
  Free-text description of the transaction.
  Examples: "spent 45 euro at rewe yesterday", "received salary 4500 PLN", "got a refund from zalando 29.99"
  Must be non-empty (validated on the client before submission).
  """
  text: String!
}

