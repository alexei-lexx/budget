type Query {
  accounts: [Account!]!
  supportedCurrencies: [String!]!
  categories(type: CategoryType): [Category!]!
  transactions(
    pagination: PaginationInput
    filters: TransactionFilterInput
  ): TransactionConnection!
  transfer(id: ID!): Transfer
  transactionPatterns(type: TransactionPatternType!): [TransactionPattern!]!
  byCategoryReport(year: Int!, month: Int, type: ReportType!): ByCategoryReport!
  insight(input: InsightInput!): InsightOutput!
  transactionDescriptionSuggestions(searchText: String!): [String!]!
  userSettings: UserSettings!
}

type User {
  email: String!
}

type UserSettings {
  transactionPatternsLimit: Int!
  voiceInputLanguage: String
}

input UpdateUserSettingsInput {
  transactionPatternsLimit: Int
  voiceInputLanguage: String
}

type Account {
  id: ID!
  name: String!
  currency: String!
  initialBalance: Float!
  balance: Float!
}

enum CategoryType {
  INCOME
  EXPENSE
}

enum TransactionType {
  INCOME
  EXPENSE
  TRANSFER_IN
  TRANSFER_OUT
  REFUND
}

enum TransactionPatternType {
  INCOME
  EXPENSE
  REFUND
}

enum ReportType {
  INCOME
  EXPENSE
}

union AgentTraceMessage =
  | AgentTraceText
  | AgentTraceToolCall
  | AgentTraceToolResult

type AgentTraceText {
  content: String!
}

type AgentTraceToolCall {
  toolName: String!
  input: String!
}

type AgentTraceToolResult {
  toolName: String!
  output: String!
}

union InsightOutput = InsightSuccess | InsightFailure

type InsightSuccess {
  answer: String!
  agentTrace: [AgentTraceMessage!]!
}

type InsightFailure {
  message: String!
  agentTrace: [AgentTraceMessage!]!
}

union CreateTransactionFromTextOutput =
  | CreateTransactionFromTextSuccess
  | CreateTransactionFromTextFailure

type CreateTransactionFromTextSuccess {
  transaction: Transaction!
  agentTrace: [AgentTraceMessage!]!
}

type CreateTransactionFromTextFailure {
  message: String!
  agentTrace: [AgentTraceMessage!]!
}

type Category {
  id: ID!
  name: String!
  type: CategoryType!
  excludeFromReports: Boolean!
}

"""
Lightweight account representation embedded in Transaction responses.
Always reflects the current state of the account at query time.
If an account ID exists but the entity cannot be found (data integrity edge case),
stub data with name "Unknown" is returned instead of null.
"""
type TransactionEmbeddedAccount {
  id: ID!
  name: String!
  isArchived: Boolean!
}

"""
Lightweight category representation embedded in Transaction responses.
Always reflects the current state of the category at query time.
If a category ID exists but the entity cannot be found (data integrity edge case),
stub data with name "Unknown" is returned instead of null.
If category ID is null (uncategorized transaction), the category field returns null.
"""
type TransactionEmbeddedCategory {
  id: ID!
  name: String!
  isArchived: Boolean!
}

"""
Transaction with embedded account and category data.
Eliminates N+1 queries by fetching account and category data directly without separate lookups.
Breaking change: accountId and categoryId fields removed (use account.id and category.id instead).
"""
type Transaction {
  id: ID!
  account: TransactionEmbeddedAccount!
  category: TransactionEmbeddedCategory
  type: TransactionType!
  amount: Float!
  currency: String!
  date: String!
  description: String
  transferId: String
}

type TransactionPattern {
  accountId: ID!
  accountName: String!
  categoryId: ID!
  categoryName: String!
}

type Transfer {
  id: ID!
  outboundTransaction: Transaction!
  inboundTransaction: Transaction!
}

input CreateAccountInput {
  name: String!
  currency: String!
  initialBalance: Float!
}

input UpdateAccountInput {
  id: ID!
  name: String
  currency: String
  initialBalance: Float
}

input CreateCategoryInput {
  name: String!
  type: CategoryType!
  excludeFromReports: Boolean!
}

input UpdateCategoryInput {
  id: ID!
  name: String
  type: CategoryType
  excludeFromReports: Boolean
}

input CreateTransactionInput {
  accountId: ID!
  categoryId: ID
  type: TransactionType!
  amount: Float!
  date: String!
  description: String
}

"""
Input for creating a transaction from a natural-language text description.
"""
input CreateTransactionFromTextInput {
  """
  Free-text description of the transaction.
  Examples: "spent 45 euro at rewe yesterday", "received salary 4500 USD", "got a refund from zalando 29.99"
  """
  text: String!
}

input UpdateTransactionInput {
  id: ID!
  accountId: ID
  categoryId: ID
  type: TransactionType
  amount: Float
  date: String
  description: String
}

input CreateTransferInput {
  fromAccountId: ID!
  toAccountId: ID!
  amount: Float!
  date: String!
  description: String
}

input UpdateTransferInput {
  id: ID!
  fromAccountId: ID
  toAccountId: ID
  amount: Float
  date: String
  description: String
}

input PaginationInput {
  first: Int
  after: String
}

input TransactionFilterInput {
  accountIds: [ID!]
  categoryIds: [ID!]
  includeUncategorized: Boolean
  dateAfter: String
  dateBefore: String
  types: [TransactionType!]
}

input DateRangeInput {
  startDate: String!
  endDate: String!
}

input InsightInput {
  question: String!
  dateRange: DateRangeInput!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type TransactionEdge {
  node: Transaction!
  cursor: String!
}

type TransactionConnection {
  edges: [TransactionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ByCategoryReportCurrencyBreakdown {
  currency: String!
  totalAmount: Float!
  percentage: Int!
}

type ByCategoryReportCategory {
  categoryId: ID
  categoryName: String!
  currencyBreakdowns: [ByCategoryReportCurrencyBreakdown!]!
  topTransactions: [Transaction!]!
  totalTransactionCount: Int!
}

type ByCategoryReportCurrencyTotal {
  currency: String!
  totalAmount: Float!
}

type ByCategoryReport {
  year: Int!
  month: Int
  type: ReportType! # TODO: remove if not needed
  categories: [ByCategoryReportCategory!]!
  currencyTotals: [ByCategoryReportCurrencyTotal!]!
}

type Mutation {
  ensureUser: User!
  createAccount(input: CreateAccountInput!): Account!
  updateAccount(input: UpdateAccountInput!): Account!
  deleteAccount(id: ID!): Boolean
  createCategory(input: CreateCategoryInput!): Category!
  updateCategory(input: UpdateCategoryInput!): Category!
  deleteCategory(id: ID!): Category!
  createTransaction(input: CreateTransactionInput!): Transaction!
  createTransactionFromText(
    input: CreateTransactionFromTextInput!
  ): CreateTransactionFromTextOutput!
  updateTransaction(input: UpdateTransactionInput!): Transaction!
  deleteTransaction(id: ID!): Transaction!
  createTransfer(input: CreateTransferInput!): Transfer!
  updateTransfer(input: UpdateTransferInput!): Transfer!
  deleteTransfer(id: ID!): Boolean
  updateUserSettings(input: UpdateUserSettingsInput!): UserSettings!
}
