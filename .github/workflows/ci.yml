name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      dynamodb:
        image: amazon/dynamodb-local:3.3.0
        ports:
          - 8000:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Check formatting with Prettier
        working-directory: backend
        run: npm run prettier

      - name: Run linter
        working-directory: backend
        run: npm run lint

      - name: Wait for DynamoDB
        run: timeout 30 bash -c 'until curl -s http://localhost:8000/ > /dev/null 2>&1; do sleep 1; done'

      - name: Setup test environment variables
        working-directory: backend
        run: cp .env.test.example .env.test

      - name: Create test database tables
        working-directory: backend
        run: npm run test:db:create

      - name: Run tests
        working-directory: backend
        run: npm run test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Check formatting with Prettier
        working-directory: frontend
        run: npm run prettier

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test

  infra-cdk:
    name: Infrastructure CDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: infra-cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra-cdk
        run: npm ci

      - name: Run typecheck
        working-directory: infra-cdk
        run: npm run typecheck

      - name: Check formatting with Prettier
        working-directory: infra-cdk
        run: npm run prettier

      - name: Run linter
        working-directory: infra-cdk
        run: npm run lint

      - name: Run tests
        working-directory: infra-cdk
        run: npm run test
